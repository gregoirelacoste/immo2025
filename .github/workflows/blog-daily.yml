name: Blog — Publication quotidienne

on:
  schedule:
    # Tous les jours à 6h00 UTC (8h00 heure française été, 7h00 hiver)
    - cron: '0 6 * * 1-6'  # Lundi à samedi
  workflow_dispatch:
    inputs:
      category:
        description: "Type d'article"
        required: true
        default: 'guide_ville'
        type: choice
        options:
          - guide_ville
          - guide_quartier
          - actu_marche
          - analyse_comparative
          - conseil_investissement
          - fiscalite
          - financement
          - etude_de_cas
      city:
        description: 'Ville (obligatoire pour guide_ville, guide_quartier, etude_de_cas)'
        required: false
        type: string
      publish:
        description: 'Publier directement'
        required: false
        default: true
        type: boolean
      dry_run:
        description: 'Dry run (pas de sauvegarde)'
        required: false
        default: false
        type: boolean

concurrency:
  group: blog-publish
  cancel-in-progress: false  # Ne pas annuler un article en cours de génération

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

jobs:
  publish-article:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Scheduled run : rotation catégorie + ville ──
      # Lun-Mer-Ven : guide_ville (rotation villes)
      # Mar : actu_marche
      # Jeu : conseil_investissement
      # Sam : fiscalite ou financement (alternance)
      - name: Génération automatique (cron)
        if: github.event_name == 'schedule'
        run: |
          DOW=$(date +%u)  # 1=lundi ... 6=samedi
          case $DOW in
            1|3|5) npx tsx scripts/blog-generate.ts --category guide_ville --city auto --publish ;;
            2)     npx tsx scripts/blog-generate.ts --category actu_marche --publish ;;
            4)     npx tsx scripts/blog-generate.ts --category conseil_investissement --publish ;;
            6)     WEEK=$(date +%V)
                   if [ $((WEEK % 2)) -eq 0 ]; then
                     npx tsx scripts/blog-generate.ts --category fiscalite --publish
                   else
                     npx tsx scripts/blog-generate.ts --category financement --publish
                   fi ;;
          esac

      # ── Manual dispatch ──
      - name: Génération manuelle (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: >-
          npx tsx scripts/blog-generate.ts
          --category "${{ inputs.category }}"
          ${{ inputs.city && format('--city "{0}"', inputs.city) }}
          ${{ inputs.publish == true && '--publish' || '' }}
          ${{ inputs.dry_run == true && '--dry-run' || '' }}
